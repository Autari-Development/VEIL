name: Issue Reporter Notify

on:
  issues:
    types:
      - closed
      - reopened
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: DM opted-in reporters about comments and closures
        uses: actions/github-script@v8
        env:
          PUBLIC_REPO: ${{ vars.PUBLIC_REPO }}
          PRIVATE_REPO: ${{ vars.PRIVATE_REPO }}
          AUTARI_DISCORD_BOT_TOKEN: ${{ secrets.AUTARI_DISCORD_BOT_TOKEN }}
        with:
          github-token: ${{ secrets.AUTARI_SYNC_TOKEN }}
          script: |
            const sourceRepo = context.payload.repository.full_name;
            const normalizedSourceRepo = (sourceRepo || "").toLowerCase();
            const normalizedPublicRepo = (process.env.PUBLIC_REPO || "").toLowerCase();
            const normalizedPrivateRepo = (process.env.PRIVATE_REPO || "").toLowerCase();
            const issue = context.payload.issue;

            if (!issue || issue.pull_request) {
              core.info("Ignoring pull request or missing issue payload.");
              return;
            }

            if (
              normalizedSourceRepo !== normalizedPublicRepo &&
              normalizedSourceRepo !== normalizedPrivateRepo
            ) {
              core.info(`Ignoring untracked repo ${sourceRepo}`);
              return;
            }

            function extractMetadata(body) {
              const text = body || "";
              const values = {};

              for (const match of text.matchAll(/<!-- autari-sync:([a-z-]+)=(.*?) -->/g)) {
                values[match[1]] = match[2].trim();
              }

              return {
                reporterDiscordId: values["reporter-discord-id"] || null,
                notificationPrefs: values.notify
                  ? values.notify.split(",").map(value => value.trim()).filter(Boolean)
                  : []
              };
            }

            function truncate(value, maxLength = 1000) {
              if (!value) return "Not provided.";
              if (value.length <= maxLength) return value;
              return `${value.slice(0, maxLength - 3).trimEnd()}...`;
            }

            async function getTimelineCloseClassification() {
              try {
                const { data } = await github.request(
                  "GET /repos/{owner}/{repo}/issues/{issue_number}/timeline",
                  {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    headers: {
                      "X-GitHub-Api-Version": "2022-11-28"
                    }
                  }
                );

                const latestDuplicateEvent = [...data]
                  .reverse()
                  .find(event => event.event === "marked_as_duplicate");

                return latestDuplicateEvent ? "duplicate" : "completed";
              } catch (error) {
                core.warning(`Issue timeline lookup failed: ${error.message}`);
                return issue.state_reason || "completed";
              }
            }

            async function createDmChannel(recipientId) {
              const response = await fetch("https://discord.com/api/v10/users/@me/channels", {
                method: "POST",
                headers: {
                  Authorization: `Bot ${process.env.AUTARI_DISCORD_BOT_TOKEN}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  recipient_id: recipientId
                })
              });

              if (!response.ok) {
                throw new Error(`Create DM channel failed (${response.status}): ${await response.text()}`);
              }

              return response.json();
            }

            async function sendDm(recipientId, embed) {
              if (!process.env.AUTARI_DISCORD_BOT_TOKEN) {
                core.warning("AUTARI_DISCORD_BOT_TOKEN secret is not configured.");
                return false;
              }

              const dmChannel = await createDmChannel(recipientId);
              const response = await fetch(`https://discord.com/api/v10/channels/${dmChannel.id}/messages`, {
                method: "POST",
                headers: {
                  Authorization: `Bot ${process.env.AUTARI_DISCORD_BOT_TOKEN}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  embeds: [embed]
                })
              });

              if (!response.ok) {
                throw new Error(`Send DM failed (${response.status}): ${await response.text()}`);
              }

              return true;
            }

            const metadata = extractMetadata(issue.body);
            if (!metadata.reporterDiscordId || metadata.notificationPrefs.length === 0) {
              core.info("Reporter did not opt in to DM updates.");
              return;
            }

            let embed = null;

            if (context.eventName === "issue_comment") {
              const comment = context.payload.comment;
              const actorLogin = comment?.user?.login || "Someone";

              if (!metadata.notificationPrefs.includes("comments")) {
                core.info("Reporter did not opt in to comment notifications.");
                return;
              }

              if (!comment || comment.user?.type === "Bot") {
                core.info("Ignoring bot comment.");
                return;
              }

              embed = {
                title: "New Comment on Your Bug Report",
                description: truncate(comment.body, 4096),
                color: 0x3B82F6,
                fields: [
                  {
                    name: "Issue",
                    value: `[#${issue.number}](${issue.html_url})`
                  },
                  {
                    name: "Commented By",
                    value: actorLogin
                  },
                  {
                    name: "Repository",
                    value: sourceRepo
                  },
                  {
                    name: "Comment Link",
                    value: comment.html_url
                  }
                ],
                timestamp: new Date(comment.created_at || Date.now()).toISOString()
              };
            }

            if (context.eventName === "issues" && context.payload.action === "reopened") {
              if (!metadata.notificationPrefs.includes("status")) {
                core.info("Reporter did not opt in to status notifications.");
                return;
              }

              embed = {
                title: "Bug Report Reopened",
                description: "Your report was reopened for more investigation.",
                color: 0x2563EB,
                fields: [
                  {
                    name: "Issue",
                    value: `[#${issue.number}](${issue.html_url})`
                  },
                  {
                    name: "Repository",
                    value: sourceRepo
                  }
                ],
                timestamp: new Date().toISOString()
              };
            }

            if (context.eventName === "issues" && context.payload.action === "closed") {
              const classification = await getTimelineCloseClassification();

              if (metadata.notificationPrefs.includes("closures")) {
                let outcomeLabel = "Solved bug";
                let outcomeBody = "Your report was closed as resolved.";

                if (classification === "not_planned") {
                  outcomeLabel = "Ignored / stale";
                  outcomeBody = "Your report was closed as not planned.";
                } else if (classification === "duplicate") {
                  outcomeLabel = "Closed as duplicate";
                  outcomeBody = "Your report was closed because it was marked as a duplicate.";
                }

                embed = {
                  title: "Bug Report Closed",
                  description: outcomeBody,
                  color: classification === "not_planned" ? 0x6B7280 : 0x10B981,
                  fields: [
                    {
                      name: "Outcome",
                      value: outcomeLabel
                    },
                    {
                      name: "Issue",
                      value: `[#${issue.number}](${issue.html_url})`
                    },
                    {
                      name: "Repository",
                      value: sourceRepo
                    }
                  ],
                  timestamp: new Date().toISOString()
                };
              } else if (metadata.notificationPrefs.includes("status")) {
                embed = {
                  title: "Bug Report Status Changed",
                  description: "Your report was closed.",
                  color: 0x10B981,
                  fields: [
                    {
                      name: "Issue",
                      value: `[#${issue.number}](${issue.html_url})`
                    },
                    {
                      name: "Repository",
                      value: sourceRepo
                    }
                  ],
                  timestamp: new Date().toISOString()
                };
              } else {
                core.info("Reporter did not opt in to closure or status notifications.");
                return;
              }
            }

            if (!embed) {
              core.info("No DM was required for this event.");
              return;
            }

            try {
              await sendDm(metadata.reporterDiscordId, embed);
              core.info(`Sent DM update to Discord user ${metadata.reporterDiscordId}.`);
            } catch (error) {
              core.warning(`Failed to send DM update: ${error.message}`);
            }
