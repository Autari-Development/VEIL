name: Issue State Sync

on:
  issues:
    types:
      - closed
      - reopened

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror linked issue state and project status
        uses: actions/github-script@v7
        env:
          PUBLIC_REPO: ${{ vars.PUBLIC_REPO }}
          PRIVATE_REPO: ${{ vars.PRIVATE_REPO }}
          PROJECT_V2_ID: ${{ vars.PROJECT_V2_ID }}
          PROJECT_STATUS_FIELD_ID: ${{ vars.PROJECT_STATUS_FIELD_ID }}
          PROJECT_OPEN_STATUS_OPTION_ID: ${{ vars.PROJECT_OPEN_STATUS_OPTION_ID }}
          PROJECT_CLOSED_STATUS_OPTION_ID: ${{ vars.PROJECT_CLOSED_STATUS_OPTION_ID }}
        with:
          github-token: ${{ secrets.AUTARI_SYNC_TOKEN }}
          script: |
            const action = context.payload.action;
            const sourceIssue = context.payload.issue;
            const sourceRepo = context.payload.repository.full_name;
            const publicRepo = process.env.PUBLIC_REPO;
            const privateRepo = process.env.PRIVATE_REPO;

            if (!["closed", "reopened"].includes(action)) {
              core.info(`Ignoring action ${action}`);
              return;
            }

            if (!publicRepo || !privateRepo) {
              core.setFailed("Missing PUBLIC_REPO or PRIVATE_REPO repository variable.");
              return;
            }

            if (sourceRepo !== publicRepo && sourceRepo !== privateRepo) {
              core.info(`Ignoring untracked repo ${sourceRepo}`);
              return;
            }

            const desiredState = action === "closed" ? "closed" : "open";

            function extractMetadata(body) {
              const text = body || "";
              const values = {};
              for (const match of text.matchAll(/<!-- autari-sync:([a-z-]+)=(.*?) -->/g)) {
                values[match[1]] = match[2].trim();
              }

              return {
                publicIssueUrl: values.public || null,
                privateIssueUrl: values.private || null,
                projectItemId: values["project-item"] || null
              };
            }

            function parseIssueUrl(issueUrl) {
              const url = new URL(issueUrl);
              const parts = url.pathname.split("/").filter(Boolean);
              if (parts.length < 4 || parts[2] !== "issues") {
                throw new Error(`Unsupported issue URL: ${issueUrl}`);
              }

              return {
                owner: parts[0],
                repo: parts[1],
                issue_number: Number(parts[3]),
                full_name: `${parts[0]}/${parts[1]}`
              };
            }

            async function getIssue({ owner, repo, issue_number }) {
              const { data } = await github.rest.issues.get({
                owner,
                repo,
                issue_number
              });

              return data;
            }

            async function updateIssueState(target, state) {
              await github.rest.issues.update({
                owner: target.owner,
                repo: target.repo,
                issue_number: target.issue_number,
                state
              });
            }

            async function updateProjectStatus(itemId, optionId) {
              if (
                !process.env.PROJECT_V2_ID ||
                !process.env.PROJECT_STATUS_FIELD_ID ||
                !itemId ||
                !optionId
              ) {
                core.info("Project status sync skipped because one or more project variables are missing.");
                return;
              }

              await github.graphql(
                `
                  mutation UpdateProjectStatus($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(
                      input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }
                    ) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `,
                {
                  projectId: process.env.PROJECT_V2_ID,
                  itemId,
                  fieldId: process.env.PROJECT_STATUS_FIELD_ID,
                  optionId
                }
              );
            }

            const metadata = extractMetadata(sourceIssue.body);
            const linkedIssueUrl =
              sourceRepo === publicRepo ? metadata.privateIssueUrl : metadata.publicIssueUrl;

            let publicIssue = sourceRepo === publicRepo ? sourceIssue : null;

            if (linkedIssueUrl) {
              const targetRef = parseIssueUrl(linkedIssueUrl);
              const targetIssue = await getIssue(targetRef);

              if (targetIssue.state !== desiredState) {
                await updateIssueState(targetRef, desiredState);
                core.info(`Updated linked issue ${linkedIssueUrl} to state ${desiredState}.`);
              } else {
                core.info(`Linked issue ${linkedIssueUrl} already in state ${desiredState}.`);
              }

              if (!publicIssue && targetRef.full_name === publicRepo) {
                publicIssue = targetIssue;
              }
            } else {
              core.info("No linked issue URL found in metadata.");
            }

            const publicMetadata = extractMetadata(publicIssue?.body);
            const projectStatusOptionId =
              desiredState === "closed"
                ? process.env.PROJECT_CLOSED_STATUS_OPTION_ID
                : process.env.PROJECT_OPEN_STATUS_OPTION_ID;

            if (publicMetadata.projectItemId && projectStatusOptionId) {
              await updateProjectStatus(publicMetadata.projectItemId, projectStatusOptionId);
              core.info(`Updated project item ${publicMetadata.projectItemId} for ${desiredState}.`);
            } else {
              core.info("Project item status sync skipped because metadata or option id is missing.");
            }
